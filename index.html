<!DOCTYPE html>
<html>
<head>
    <title>Perfect Origin Sync Matrix</title>
</head>
<body style="background:#0a0a0c; color:#00ff66; font-family:monospace; padding:30px;">

    <h2>⚡ Netsight Origin Lock: Absolute Clean Engine</h2>
    <p>Status: Injecting fully resolved URL...</p>

    <div id="capture-stage"></div>

    <script>
        // Dynamically build the exact absolute URL to eliminate the "./" or missing slash issues
        const targetUrl = window.location.origin + "/electricman-2-hs.swf";
        
        const embed = document.createElement('embed');
        embed.setAttribute('src', targetUrl);
        embed.setAttribute('type', 'application/x-shockwave-flash');
        embed.setAttribute('width', '1');
        embed.setAttribute('height', '1');
        
        document.getElementById('capture-stage').appendChild(embed);
        console.log("Injected clean target:", targetUrl);
    </script>

</body>
</html>
